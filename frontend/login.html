<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kasi Flavour – Login</title>
  <link rel="stylesheet" href="./css/main.css"/>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh;
           background: linear-gradient(135deg,#D32F2F 0%,#E64A19 50%,#FF6F00 100%); }

    .auth-card {
      background: #fff;
      border-radius: 16px;
      width: min(420px, 95vw);
      box-shadow: 0 16px 48px rgba(0,0,0,.22);
      overflow: hidden;
    }

    .auth-logo {
      background: #3E2723;
      padding: 24px;
      text-align: center;
    }
    .auth-logo .kasi    { font-size:32px; font-weight:900; color:#FDD835; letter-spacing:4px; }
    .auth-logo .flavour { font-size:26px; font-weight:700; color:#fff;    letter-spacing:2px; }
    .auth-logo p        { font-size:12px; color:rgba(255,255,255,.6); margin-top:4px; }

    .auth-body { padding: 28px; }

    /* Role tabs */
    .role-tabs { display:flex; border-radius:10px; overflow:hidden;
                 border:1.5px solid #eee; margin-bottom:24px; }
    .role-tab  { flex:1; padding:10px 0; text-align:center; font-size:13px;
                 font-weight:600; cursor:pointer; border:none;
                 background:#f9f9f9; color:#888; transition:all .18s; }
    .role-tab.active { background:#D32F2F; color:#fff; }

    .form-group { margin-bottom:16px; }
    .form-group label { display:block; font-size:12px; font-weight:700;
                        color:#555; text-transform:uppercase;
                        letter-spacing:.8px; margin-bottom:6px; }
    .form-group input, .form-group select {
      width:100%; padding:12px 14px; border:1.5px solid #e0e0e0;
      border-radius:8px; font-size:15px; outline:none;
      transition:border-color .18s;
    }
    .form-group input:focus, .form-group select:focus { border-color:#D32F2F; }

    .btn-auth {
      width:100%; padding:14px; background:#D32F2F; color:#fff;
      border:none; border-radius:8px; font-size:16px; font-weight:700;
      cursor:pointer; transition:background .18s; margin-top:8px;
    }
    .btn-auth:hover { background:#E64A19; }
    .btn-auth:disabled { background:#ccc; cursor:not-allowed; }

    .divider { text-align:center; margin:16px 0; color:#aaa; font-size:13px; }

    .switch-link { text-align:center; font-size:14px; color:#666; margin-top:12px; }
    .switch-link a { color:#D32F2F; font-weight:600; text-decoration:none; }
    .switch-link a:hover { text-decoration:underline; }

    .error-msg { background:#fff3f3; border:1.5px solid #ffcdd2;
                 border-radius:8px; padding:10px 14px; font-size:13px;
                 color:#c62828; margin-bottom:16px; display:none; }
    .success-msg { background:#f0faf0; border:1.5px solid #c8e6c9;
                   border-radius:8px; padding:10px 14px; font-size:13px;
                   color:#2e7d32; margin-bottom:16px; display:none; }

    .role-badge {
      display:inline-block; padding:3px 10px; border-radius:20px;
      font-size:11px; font-weight:700; margin-left:6px;
    }
    .role-badge.customer { background:#FFF8E1; color:#FF6F00; }
    .role-badge.cook     { background:#FFF3E0; color:#D32F2F; }
    .role-badge.driver   { background:#E8F5E9; color:#2E7D32; }
  </style>
</head>
<body>

<div class="auth-card">
  <div class="auth-logo">
    <div><span class="kasi">KASI</span> <span class="flavour">FLAVOUR</span></div>
    <p>Home-cooked meals · delivered fast</p>
  </div>

  <div class="auth-body">

    <!-- Role selector tabs -->
    <div class="role-tabs">
      <button class="role-tab active" onclick="setRole('customer',this)">🛒 Customer</button>
      <button class="role-tab"        onclick="setRole('cook',this)"    >👨‍🍳 Cook</button>
      <button class="role-tab"        onclick="setRole('driver',this)"  >🚴 Driver</button>
    </div>

    <div id="error-msg"   class="error-msg"></div>
    <div id="success-msg" class="success-msg"></div>

    <!-- LOGIN FORM -->
    <div id="login-form">
      <div class="form-group">
        <label>Phone number</label>
        <input id="login-phone" type="tel" placeholder="e.g. 0721234567" autocomplete="tel"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="login-pass" type="password" placeholder="Your password" autocomplete="current-password"/>
      </div>
      <button class="btn-auth" id="login-btn" onclick="doLogin()">Log In</button>
      <div class="divider">— or —</div>
      <div class="switch-link">
        Don't have an account? <a href="#" onclick="showRegister()">Sign up</a>
      </div>
    </div>

    <!-- REGISTER FORM (hidden by default) -->
    <div id="register-form" style="display:none">
      <div class="form-group">
        <label>Full name</label>
        <input id="reg-name" type="text" placeholder="Your full name" autocomplete="name"/>
      </div>
      <div class="form-group">
        <label>Phone number</label>
        <input id="reg-phone" type="tel" placeholder="e.g. 0721234567" autocomplete="tel"/>
      </div>
      <div class="form-group">
        <label>Email (optional)</label>
        <input id="reg-email" type="email" placeholder="your@email.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="reg-pass" type="password" placeholder="Choose a strong password" autocomplete="new-password"/>
      </div>
      <!-- Cook-specific field -->
      <div id="cook-field" class="form-group" style="display:none">
        <label>Your kasi / neighbourhood</label>
        <select id="reg-kasi">
          <option value="">Select your kasi</option>
          <option>Soweto</option><option>Alexandra</option><option>Tembisa</option>
          <option>Soshanguve</option><option>Mamelodi</option><option>Attridgeville</option>
          <option>Katlehong</option><option>Vosloorus</option><option>Other</option>
        </select>
      </div>
      <!-- Driver-specific field -->
      <div id="driver-field" class="form-group" style="display:none">
        <label>Vehicle type</label>
        <select id="reg-vehicle">
          <option value="motorbike">🏍 Motorbike</option>
          <option value="bicycle">🚲 Bicycle</option>
          <option value="car">🚗 Car</option>
        </select>
      </div>
      <button class="btn-auth" id="reg-btn" onclick="doRegister()">Create Account</button>
      <div class="divider">— or —</div>
      <div class="switch-link">
        Already have an account? <a href="#" onclick="showLogin()">Log in</a>
      </div>
    </div>

  </div>
</div>

<script>
const API = "/api";
let currentRole = "customer";

function setRole(role, el) {
  currentRole = role;
  document.querySelectorAll(".role-tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  // Show/hide role-specific fields
  document.getElementById("cook-field").style.display   = role === "cook"   ? "block" : "none";
  document.getElementById("driver-field").style.display = role === "driver" ? "block" : "none";
  clearMsgs();
}

function showRegister() {
  document.getElementById("login-form").style.display    = "none";
  document.getElementById("register-form").style.display = "block";
  clearMsgs();
}
function showLogin() {
  document.getElementById("register-form").style.display = "none";
  document.getElementById("login-form").style.display    = "block";
  clearMsgs();
}

function showError(msg)   { const el = document.getElementById("error-msg");   el.textContent = msg; el.style.display = "block"; document.getElementById("success-msg").style.display = "none"; }
function showSuccess(msg) { const el = document.getElementById("success-msg"); el.textContent = msg; el.style.display = "block"; document.getElementById("error-msg").style.display   = "none"; }
function clearMsgs()      { document.getElementById("error-msg").style.display = "none"; document.getElementById("success-msg").style.display = "none"; }

async function doLogin() {
  const phone    = document.getElementById("login-phone").value.trim();
  const password = document.getElementById("login-pass").value;
  if (!phone || !password) { showError("Please enter phone and password."); return; }

  const btn = document.getElementById("login-btn");
  btn.disabled = true; btn.textContent = "Logging in…";

  try {
    const res  = await fetch(`${API}/auth/login`, {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ phone, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || "Login failed");

    // Save token + role
    localStorage.setItem("kf_token", data.access_token);
    localStorage.setItem("kf_role",  currentRole);

    showSuccess("Login successful! Redirecting…");
    setTimeout(() => redirectByRole(currentRole), 800);
  } catch (e) {
    showError(e.message);
  } finally {
    btn.disabled = false; btn.textContent = "Log In";
  }
}

async function doRegister() {
  const name     = document.getElementById("reg-name").value.trim();
  const phone    = document.getElementById("reg-phone").value.trim();
  const email    = document.getElementById("reg-email").value.trim();
  const password = document.getElementById("reg-pass").value;

  if (!name || !phone || !password) { showError("Name, phone and password are required."); return; }
  if (password.length < 6)          { showError("Password must be at least 6 characters."); return; }

  const btn = document.getElementById("reg-btn");
  btn.disabled = true; btn.textContent = "Creating account…";

  try {
    const res  = await fetch(`${API}/auth/register`, {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ name, phone, email: email||null, password, role: currentRole }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || "Registration failed");

    localStorage.setItem("kf_token", data.access_token);
    localStorage.setItem("kf_role",  currentRole);

    showSuccess("Account created! Redirecting…");
    setTimeout(() => redirectByRole(currentRole), 800);
  } catch (e) {
    showError(e.message);
  } finally {
    btn.disabled = false; btn.textContent = "Create Account";
  }
}

function redirectByRole(role) {
  const map = {
    customer: "index.html",
    cook:     "seller.html",
    driver:   "driver.html",
  };
  window.location.href = map[role] || "index.html";
}

// Auto-redirect if already logged in
if (localStorage.getItem("kf_token")) {
  redirectByRole(localStorage.getItem("kf_role") || "customer");
}
</script>
</body>
</html>
