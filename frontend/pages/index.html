<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kasi Flavour – Order Food</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="manifest" href="../manifest.json"/>
</head>
<body>

<!-- ── NAV ─────────────────────────────────────────────────────────────── -->
<nav class="navbar">
  <div class="nav-brand">
    <span class="brand-kasi">KASI</span>
    <span class="brand-flavour">FLAVOUR</span>
  </div>
  <div class="nav-links">
    <a href="index.html" class="active">Browse</a>
    <a href="orders.html">My Orders</a>
    <a href="seller.html">Sell</a>
  </div>
  <button class="cart-btn" onclick="openCart()">
    🛒 Cart <span id="cart-count" class="badge">0</span>
  </button>
</nav>

<!-- ── HERO ─────────────────────────────────────────────────────────────── -->
<section class="hero">
  <h1>Home-cooked meals, <span class="accent">delivered fast</span></h1>
  <p>From your kasi — at prices that won't break the bank</p>
  <div class="search-bar">
    <input id="search" type="text" placeholder="Search meals, cuisine or kasi…" oninput="filterMenus()"/>
    <select id="kasi-filter" onchange="filterMenus()">
      <option value="">All kasies</option>
      <option>Soweto</option>
      <option>Alexandra</option>
      <option>Tembisa</option>
      <option>Soshanguve</option>
    </select>
  </div>
</section>

<!-- ── FLASH DEALS ───────────────────────────────────────────────────────── -->
<section class="section">
  <div class="section-header">
    <h2>⏱ Flash Deals</h2>
    <span id="flash-timer" class="timer"></span>
  </div>
  <div id="flash-grid" class="menu-grid"></div>
</section>

<!-- ── RECOMMENDED ───────────────────────────────────────────────────────── -->
<section class="section">
  <h2>⭐ Recommended for you</h2>
  <div id="rec-grid" class="menu-grid"></div>
</section>

<!-- ── ALL MENUS ─────────────────────────────────────────────────────────── -->
<section class="section">
  <h2>🍽 All Meals</h2>
  <div id="menu-grid" class="menu-grid"></div>
</section>

<!-- ── CART DRAWER ───────────────────────────────────────────────────────── -->
<div id="cart-overlay" class="overlay hidden" onclick="closeCart()"></div>
<aside id="cart-drawer" class="cart-drawer hidden">
  <div class="cart-header">
    <h3>Your Cart</h3>
    <button onclick="closeCart()">✕</button>
  </div>
  <div id="cart-items"></div>
  <div class="cart-footer">
    <p>Delivery: <strong>R8.00</strong></p>
    <p>Total: <strong id="cart-total">R0.00</strong></p>
    <button class="btn-primary" onclick="placeOrder()">Place Order</button>
  </div>
</aside>

<script src="../js/api.js"></script>
<script src="../js/cart.js"></script>
<script src="../js/menus.js"></script>
</body>
</html>
